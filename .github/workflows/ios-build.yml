name: iOS Build and Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Test
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Build for simulator
        run: |
          xcodebuild build \
            -project Sortis.xcodeproj \
            -scheme Sortis \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.2' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build app package
        run: |
          xcodebuild build \
            -project Sortis.xcodeproj \
            -scheme Sortis \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.2' \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create app archive
        run: |
          cd build/DerivedData/Build/Products/Release-iphonesimulator
          zip -r Sortis-iOS-Simulator.zip Sortis.app

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sortis-iOS-Simulator
          path: build/DerivedData/Build/Products/Release-iphonesimulator/Sortis-iOS-Simulator.zip
          retention-days: 30
