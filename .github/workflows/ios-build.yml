name: iOS Build and Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    name: Build and Test
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show available simulators
        run: xcrun simctl list devices available

      - name: Build for simulator
        run: |
          xcodebuild build \
            -project Sortis.xcodeproj \
            -scheme Sortis \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.2' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Run tests
        run: |
          xcodebuild test \
            -project Sortis.xcodeproj \
            -scheme Sortis \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.2' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO || true

      - name: Build app package
        run: |
          xcodebuild build \
            -project Sortis.xcodeproj \
            -scheme Sortis \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.2' \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          # 找到 .app 文件
          APP_PATH=$(find build/DerivedData -name "Sortis.app" -type d | head -1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Create app archive
        run: |
          cd build/DerivedData/Build/Products/Release-iphonesimulator
          zip -r Sortis-iOS-Simulator.zip Sortis.app

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sortis-iOS-Simulator
          path: build/DerivedData/Build/Products/Release-iphonesimulator/Sortis-iOS-Simulator.zip
          retention-days: 30

  build-release:
    name: Build for Release (No Signing)
    runs-on: macos-14
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Build for device (unsigned)
        run: |
          # Build for device without code signing
          xcodebuild archive \
            -project Sortis.xcodeproj \
            -scheme Sortis \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath build/Sortis.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      - name: Embed Swift libraries
        run: |
          # Find Swift toolchain
          TOOLCHAIN_DIR=$(xcode-select -p)/Toolchains/XcodeDefault.xctoolchain
          SWIFT_LIB_DIR="$TOOLCHAIN_DIR/usr/lib/swift-5.5/iphoneos"

          # If swift-5.5 doesn't exist, try swift folder
          if [ ! -d "$SWIFT_LIB_DIR" ]; then
            SWIFT_LIB_DIR="$TOOLCHAIN_DIR/usr/lib/swift/iphoneos"
          fi

          echo "Swift libraries location: $SWIFT_LIB_DIR"
          ls -la "$SWIFT_LIB_DIR" || echo "Directory not found"

          # Create Frameworks directory and copy Swift libraries
          APP_PATH="build/Sortis.xcarchive/Products/Applications/Sortis.app"
          mkdir -p "$APP_PATH/Frameworks"

          # Copy required Swift dylibs
          for lib in libswiftCore.dylib libswiftFoundation.dylib libswiftUIKit.dylib \
                      libswiftSwiftOnoneSupport.dylib libswift_Concurrency.dylib \
                      libswiftDarwin.dylib libswiftDispatch.dylib libswiftObjectiveC.dylib \
                      libswiftCoreGraphics.dylib libswiftCoreImage.dylib libswiftCoreText.dylib \
                      libswiftsimd.dylib libswiftos.dylib libswiftQuartzCore.dylib \
                      libswiftSpriteKit.dylib libswiftSceneKit.dylib libswiftCoreAudio.dylib \
                      libswiftCoreData.dylib libswiftCoreLocation.dylib libswiftCoreMedia.dylib \
                      libswiftAVFoundation.dylib libswiftAccelerate.dylib libswiftMetal.dylib \
                      libswiftSwiftDylib.dylib; do
            if [ -f "$SWIFT_LIB_DIR/$lib" ]; then
              cp "$SWIFT_LIB_DIR/$lib" "$APP_PATH/Frameworks/"
              echo "Copied $lib"
            fi
          done

          echo "Frameworks contents:"
          ls -la "$APP_PATH/Frameworks/" || echo "No frameworks"

      - name: Create unsigned IPA
        run: |
          mkdir -p build/Payload
          cp -r build/Sortis.xcarchive/Products/Applications/Sortis.app build/Payload/
          cd build
          zip -r Sortis-Unsigned.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Sortis-iOS-Unsigned
          path: build/Sortis-Unsigned.ipa
          retention-days: 30